version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mindmate_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mindmate_root_password
      MYSQL_DATABASE: mindmate
      MYSQL_USER: mindmate_user
      MYSQL_PASSWORD: mindmate_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mindmate_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmindmate_root_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mindmate_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://mindmate_user:mindmate_password@db:3306/mindmate
      - SECRET_KEY=super_secret_mindmate_ai_key_for_placements_2026
      - VECTOR_DB_TYPE=faiss
      - REFRESH_TOKEN_EXPIRE_DAYS=30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_data:/app
    networks:
      - mindmate_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/')"]
      interval: 15s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindmate_frontend
    restart: always
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mindmate_net

volumes:
  mysql_data:
  backend_data:

networks:
  mindmate_net:
    driver: bridge
